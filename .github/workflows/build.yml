name: STM32 Build CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Install ARM GNU Toolchain
        run: |
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/13.3.rel1/binrel/arm-gnu-toolchain-13.3.rel1-x86_64-arm-none-eabi.tar.xz
          sudo tar -xf arm-gnu-toolchain-13.3.rel1-x86_64-arm-none-eabi.tar.xz -C /opt
          echo "ARM_TOOLCHAIN=/opt/arm-gnu-toolchain-13.3.rel1-x86_64-arm-none-eabi" >> $GITHUB_ENV

      - name: Clone STM32CubeF4 HAL (shallow)
        run: |
          git clone --depth 1 https://github.com/STMicroelectronics/STM32CubeF4.git cube_f4
          mkdir -p Drivers/STM32F4xx_HAL_Driver
          cp -r cube_f4/Drivers/STM32F4xx_HAL_Driver/Src Drivers/STM32F4xx_HAL_Driver/
          cp -r cube_f4/Drivers/STM32F4xx_HAL_Driver/Inc Drivers/STM32F4xx_HAL_Driver/
          rm -rf cube_f4

      - name: Clone CMSIS device headers (shallow)
        run: |
          git clone --depth 1 https://github.com/STMicroelectronics/cmsis-device-f4.git cmsis_f4
          mkdir -p Drivers/CMSIS/Device/ST/STM32F4xx
          cp -r cmsis_f4/Include Drivers/CMSIS/Device/ST/STM32F4xx/
          cp -r cmsis_f4/Source Drivers/CMSIS/Device/ST/STM32F4xx/
          rm -rf cmsis_f4

      - name: Fetch CMSIS Core headers
        run: |
          mkdir -p Drivers/CMSIS/Include
          CMSIS_RAW="https://raw.githubusercontent.com/ARM-software/CMSIS_5/develop/CMSIS/Core/Include"
          curl -fsSL "$CMSIS_RAW/cmsis_compiler.h" -o Drivers/CMSIS/Include/cmsis_compiler.h
          curl -fsSL "$CMSIS_RAW/cmsis_gcc.h"      -o Drivers/CMSIS/Include/cmsis_gcc.h
          curl -fsSL "$CMSIS_RAW/cmsis_version.h"  -o Drivers/CMSIS/Include/cmsis_version.h
          curl -fsSL "$CMSIS_RAW/core_cm4.h"       -o Drivers/CMSIS/Include/core_cm4.h
          curl -fsSL "$CMSIS_RAW/mpu_armv7.h"      -o Drivers/CMSIS/Include/mpu_armv7.h

      - name: Create linker script
        run: |
          cat > STM32F407VG_FLASH.ld << 'LDEOL'
          MEMORY
          {
            FLASH (rx)  : ORIGIN = 0x08000000, LENGTH = 1024K
            RAM   (rwx) : ORIGIN = 0x20000000, LENGTH = 128K
            CCMRAM(rw)  : ORIGIN = 0x10000000, LENGTH = 64K
          }

          _estack = ORIGIN(RAM) + LENGTH(RAM);

          SECTIONS
          {
            .isr_vector : { KEEP(*(.isr_vector)) } >FLASH
            .text : { *(.text*) *(.glue_7) *(.glue_7t) } >FLASH
            .rodata : { *(.rodata*) } >FLASH
            .init_array : { __init_array_start = .; KEEP(*(SORT(.init_array.*))) KEEP(*(.init_array)) __init_array_end = .; } >FLASH
            .data : { __data_start = .; *(.data*) __data_end = .; } >RAM AT>FLASH
            .bss : { __bss_start = .; *(.bss*) *(COMMON) __bss_end = .; } >RAM
          }
          LDEOL

      - name: Create CMake toolchain file
        run: |
          cat > toolchain-arm-none-eabi.cmake << 'TCEOL'
          set(CMAKE_SYSTEM_NAME Generic)
          set(CMAKE_SYSTEM_PROCESSOR arm)

          set(TC_PREFIX "$ENV{ARM_TOOLCHAIN}/bin/arm-none-eabi-")
          set(CMAKE_C_COMPILER   "${TC_PREFIX}gcc")
          set(CMAKE_CXX_COMPILER "${TC_PREFIX}g++")
          set(CMAKE_ASM_COMPILER "${TC_PREFIX}gcc")
          set(CMAKE_OBJCOPY      "${TC_PREFIX}objcopy" CACHE FILEPATH "")
          set(CMAKE_SIZE         "${TC_PREFIX}size"    CACHE FILEPATH "")

          set(MCU_FLAGS "-mcpu=cortex-m4 -mthumb -mfpu=fpv4-sp-d16 -mfloat-abi=hard")
          set(MCU_FLAGS "${MCU_FLAGS} -Wall -Os -ffunction-sections -fdata-sections")

          set(CMAKE_C_FLAGS_INIT   "${MCU_FLAGS}")
          set(CMAKE_ASM_FLAGS_INIT "${MCU_FLAGS}")
          set(CMAKE_EXE_LINKER_FLAGS_INIT "-specs=nosys.specs -specs=nano.specs -Wl,--gc-sections -Wl,-T${CMAKE_SOURCE_DIR}/STM32F407VG_FLASH.ld")

          set(CMAKE_TRY_COMPILE_TARGET_TYPE STATIC_LIBRARY)

          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          TCEOL

      - name: Build firmware
        run: |
          mkdir build
          cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=../toolchain-arm-none-eabi.cmake \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -G Ninja
          cmake --build . 2>&1

      - name: Print binary size
        run: |
          ${{ env.ARM_TOOLCHAIN }}/bin/arm-none-eabi-size build/stm32_temp_controller

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-binaries
          path: |
            build/stm32_temp_controller
            build/stm32_temp_controller.elf
          if-no-files-found: warn
